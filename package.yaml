name: metasonic-bridge
version: 0.1.0.0
license: GPL-3.0-only
author: Bernardo Barros
maintainer: bernardo@example.com
copyright: "2026 Bernardo Barros"
synopsis: MetaSonic bridge between Haskell graph compiler and RT engine
category: Audio

# Build flags for diagnostic tooling. AddressSanitizer + UBSan target
# the parallel-test heap corruption seen in commit 5629532 and again
# while landing the serial-default test gate. Off by default; enable
# via `stack build --flag metasonic-bridge:asan` or the matching
# `just stack-test-parallel-asan` recipe. See justfile for env-var
# tuning.
flags:
  asan:
    description: Compile and link the C++ runtime with AddressSanitizer + UBSan.
    default: false
    manual: true

dependencies:
  - base >= 4.14 && < 5
  - bytestring
  - containers
  - mtl
  - deepseq
  - network
  - text
  # Authoring manifest export (Phase 8.H):
  - aeson
  - aeson-pretty
  # Terminal UI Inspector:
  - brick
  - vty
  - vty-crossplatform
  - microlens
  - microlens-th
  - microlens-mtl

ghc-options:
  - -Wall

# MetaSonic modules live here. The C++ runtime is
# compiled as part of the library, so both the executable
# and tests link against the same object.

library:
  source-dirs: src
  exposed-modules:
    - MetaSonic.Types
    - MetaSonic.ControlTarget
    - MetaSonic.Bridge.Source
    - MetaSonic.Bridge.Validate
    - MetaSonic.Bridge.IR
    - MetaSonic.Bridge.Compile
    - MetaSonic.Bridge.Compile.Types
    - MetaSonic.Bridge.Compile.Regions
    - MetaSonic.Bridge.Compile.RegionKernels
    - MetaSonic.Bridge.Compile.Dependencies
    - MetaSonic.Bridge.Compile.Fusion
    - MetaSonic.Bridge.Compile.Schedule
    - MetaSonic.Bridge.Compile.EdgeRates
    - MetaSonic.Bridge.Compile.Latency
    - MetaSonic.Bridge.Compile.FusionProgram
    - MetaSonic.Bridge.Planner
    - MetaSonic.Bridge.Templates
    - MetaSonic.Bridge.Buffer
    - MetaSonic.Bridge.FFI
    - MetaSonic.Bridge.MidiDemo
    - MetaSonic.MIDI.Devices
    - MetaSonic.OSC.Wire
    - MetaSonic.OSC.Dispatch
    - MetaSonic.OSC.Dispatch.Internal
    - MetaSonic.OSC.Listen
    - MetaSonic.Pattern
    - MetaSonic.Pattern.Corpus
    - MetaSonic.Session.AdapterIssue
    - MetaSonic.Session.Arbitration
    - MetaSonic.Session.ArbitrationGateway
    - MetaSonic.Session.Command
    - MetaSonic.Session.Resolve
    - MetaSonic.Session.Report
    - MetaSonic.Session.State
    - MetaSonic.Session.Runtime
    - MetaSonic.Session.Step
    - MetaSonic.Session.RTGraphAdapter
    - MetaSonic.Session.Owner
    - MetaSonic.Session.Queue
    - MetaSonic.Session.PatternProducer
    - MetaSonic.Session.Runner
    - MetaSonic.Session.Host
    - MetaSonic.Session.FanIn
    - MetaSonic.Session.FanInService
    - MetaSonic.Session.ManifestReload
    - MetaSonic.Session.ManifestReload.Construct
    - MetaSonic.Session.ManifestReload.Runtime
    - MetaSonic.Session.MIDIProducer
    - MetaSonic.Session.MIDIListener
    - MetaSonic.Session.MIDIPortMIDI
    - MetaSonic.Session.OSCProducer
    - MetaSonic.Session.OSCListener
    - MetaSonic.Session.UIProducer
    - MetaSonic.Authoring
    - MetaSonic.Authoring.Report
    - MetaSonic.Authoring.Manifest
    - MetaSonic.Visualize.Trace
    - MetaSonic.Visualize.TUI

  cxx-sources:
    - tinysynth/rt_graph.cpp
    - tinysynth/rt_graph_plugins.cpp
    - tinysynth/plugins/identity.cpp
    - tinysynth/voice_allocator.cpp
    - tinysynth/midi_voice_processor.cpp
    - tinysynth/midi_demo.cpp
    - tinysynth/session_midi_source.cpp
    # Local replacements for vendor's q_io midi_device.cpp +
    # midi_stream.cpp; see file headers and CMakeLists.txt comment.
    - tinysynth/q_midi_device.cpp
    - tinysynth/q_midi_stream.cpp
    - vendor/q/q_io/src/audio_device.cpp
    - vendor/q/q_io/src/audio_stream.cpp

  cxx-options:
    - -std=c++20

  include-dirs:
    - tinysynth
    - vendor/q
    - vendor/q/q_lib/include
    - vendor/q/q_io/include
    - vendor/infra/include

  extra-libraries:
    - stdc++
    - portaudio
    - portmidi
    - asound

  when:
    - condition: flag(asan)
      cxx-options:
        - -fsanitize=address,undefined
        - -fno-omit-frame-pointer
        - -g
      ld-options:
        - -fsanitize=address,undefined

# Thin app that imports the library. No C++ here

executables:
  metasonic-bridge:
    main: Main.hs
    source-dirs: app
    other-modules:
